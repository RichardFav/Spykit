name: spykit_env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - scikit-image
  - numpy
  - scipy
  - pyqt=6
  - pyqtgraph  
  - bigtree
  - pandas
  - hdbscan
  - pip:
    - spikeinterface=0.102.3
    - spikewrap=0.3.0
    - docker
    - kilosort=4.1.2